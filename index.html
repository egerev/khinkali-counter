<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Счётчик хинкалей</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #f5f0e8 0%, #ece4d4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #3d3529;
        }
        h1 { font-size: 24px; font-weight: 800; text-align: center; margin-top: 40px; line-height: 1.2; }
        .khinkali-img { width: 120px; height: 120px; margin: 10px 0; transition: transform 0.15s; }
        .khinkali-img.bounce { transform: scale(1.2); }
        .counter-box { background: #faf6ef; border-radius: 20px; padding: 15px 50px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin: 5px 0 12px; }
        .counter { font-size: 64px; font-weight: 900; text-align: center; }
        .add-btn {
            background: #6b8e3a; color: white; border: none; border-radius: 16px;
            padding: 14px 50px; font-size: 20px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(107,142,58,0.4); transition: all 0.15s;
        }
        .add-btn:active { transform: scale(0.95); }
        .add-btn:disabled { background: #a0a0a0; }
        .reset-btn { background: none; border: none; color: #8a7e6b; font-size: 14px; margin-top: 10px; cursor: pointer; padding: 8px; }
        .processing { margin: 10px 0; font-size: 15px; color: #6b8e3a; display: none; }
        .stats { background: white; border-radius: 16px; padding: 14px 20px; margin-top: 12px; width: 100%; max-width: 320px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
        .stats h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
        .stat-row { display: flex; align-items: center; padding: 5px 0; font-size: 14px; }
        .stat-icon { margin-right: 8px; font-size: 16px; }
        .stat-label { flex: 1; color: #6b6153; }
        .stat-value { font-weight: 700; }
        .leaderboard { background: white; border-radius: 16px; padding: 14px 20px; margin-top: 10px; width: 100%; max-width: 320px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
        .leaderboard h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
        .lb-row { display: flex; align-items: center; padding: 4px 0; font-size: 13px; }
        .lb-rank { width: 24px; font-weight: 700; }
        .lb-name { flex: 1; }
        .lb-score { font-weight: 700; }
        .footer { margin-top: 15px; font-size: 12px; color: #a89e8e; }
        .error { color: #c44; font-size: 14px; margin: 8px 0; display: none; }
    </style>
</head>
<body>
    <h1>Счётчик<br>съеденных хинкалей</h1>
    <div class="khinkali-img" id="emoji">
        <svg viewBox="0 0 200 200" width="120" height="120">
            <defs><radialGradient id="g1" cx="40%" cy="35%"><stop offset="0%" stop-color="#f5e6c8"/><stop offset="100%" stop-color="#d4b896"/></radialGradient></defs>
            <ellipse cx="100" cy="120" rx="70" ry="55" fill="url(#g1)" stroke="#c4a070" stroke-width="1.5"/>
            <path d="M100 65 Q85 50 90 35 Q95 25 100 30 Q105 25 110 35 Q115 50 100 65Z" fill="#d4b896" stroke="#c4a070" stroke-width="1.5"/>
            <path d="M55 95 Q70 80 85 90" fill="none" stroke="#c4a070" stroke-width="1.5" opacity="0.6"/>
            <path d="M70 85 Q85 72 100 82" fill="none" stroke="#c4a070" stroke-width="1.5" opacity="0.6"/>
            <path d="M100 82 Q115 72 130 85" fill="none" stroke="#c4a070" stroke-width="1.5" opacity="0.6"/>
            <path d="M115 90 Q130 80 145 95" fill="none" stroke="#c4a070" stroke-width="1.5" opacity="0.6"/>
            <circle cx="85" cy="115" r="3" fill="#5a4a3a"/><circle cx="115" cy="115" r="3" fill="#5a4a3a"/>
            <path d="M92 128 Q100 135 108 128" fill="none" stroke="#5a4a3a" stroke-width="2" stroke-linecap="round"/>
            <circle cx="78" cy="125" r="6" fill="#f0c0a0" opacity="0.4"/><circle cx="122" cy="125" r="6" fill="#f0c0a0" opacity="0.4"/>
        </svg>
    </div>
    <div class="counter-box">
        <div class="counter" id="count">—</div>
    </div>
    <button class="add-btn" id="addBtn">📸 Сфоткать хинкали</button>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
    <div class="processing" id="processing">🔄 Считаю хинкали на фото...</div>
    <div class="error" id="error"></div>
    <button class="reset-btn" id="resetBtn">↻ Сбросить сессию</button>

    <div class="stats">
        <h3>📊 Статистика</h3>
        <div class="stat-row"><span class="stat-icon">📅</span><span class="stat-label">Сегодня:</span><span class="stat-value" id="today">—</span></div>
        <div class="stat-row"><span class="stat-icon">📈</span><span class="stat-label">Сессия:</span><span class="stat-value" id="session">—</span></div>
        <div class="stat-row"><span class="stat-icon">🏆</span><span class="stat-label">Рекорд:</span><span class="stat-value" id="record">—</span></div>
        <div class="stat-row"><span class="stat-icon">🥟</span><span class="stat-label">Всего:</span><span class="stat-value" id="total">—</span></div>
    </div>

    <div class="leaderboard" id="leaderboard">
        <h3>🏅 Топ хинкалеедов</h3>
        <div id="lbRows">Загрузка...</div>
    </div>

    <div class="footer">🥟 Ешь хинкали — устанавливай рекорды!</div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();

        const userId = String(tg?.initDataUnsafe?.user?.id || 'anon');
        const userName = tg?.initDataUnsafe?.user?.first_name || 'Гость';

        // API base — Mac Mini on Tailscale or localhost
        const API = 'https://egerev.github.io/khinkali-counter'; // Will be proxied
        // For now: direct to Mac Mini API via Tailscale IP
        const API_BASE = window.location.hostname === 'egerev.github.io'
            ? '' // Same-origin won't work for GH Pages → use bot chat for photos
            : `http://${window.location.hostname}:5199`;

        async function loadStats() {
            try {
                if (!API_BASE) { renderOffline(); return; }
                const resp = await fetch(`${API_BASE}/api/stats/${userId}`);
                const s = await resp.json();
                document.getElementById('count').textContent = s.session || 0;
                document.getElementById('today').textContent = s.today || 0;
                document.getElementById('session').textContent = s.session || 0;
                document.getElementById('record').textContent = s.record || 0;
                document.getElementById('total').textContent = s.total || 0;
            } catch(e) {
                renderOffline();
            }
        }

        async function loadLeaderboard() {
            try {
                if (!API_BASE) { return; }
                const resp = await fetch(`${API_BASE}/api/leaderboard`);
                const lb = await resp.json();
                const medals = ['🥇','🥈','🥉'];
                if (lb.length === 0) {
                    document.getElementById('lbRows').innerHTML = 'Пока никто не ел 😢';
                    return;
                }
                document.getElementById('lbRows').innerHTML = lb.map(e =>
                    `<div class="lb-row"><span class="lb-rank">${medals[e.rank-1]||e.rank}</span><span class="lb-name">${e.name}</span><span class="lb-score">${e.total}</span></div>`
                ).join('');
            } catch(e) {
                document.getElementById('lbRows').innerHTML = 'Не удалось загрузить';
            }
        }

        function renderOffline() {
            document.getElementById('count').textContent = '📸';
            document.getElementById('today').textContent = '—';
            document.getElementById('session').textContent = '—';
            document.getElementById('record').textContent = '—';
            document.getElementById('total').textContent = '—';
            document.getElementById('lbRows').innerHTML = 'Отправь фото в чат бота для подсчёта';
        }

        async function uploadPhoto(file) {
            document.getElementById('processing').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('addBtn').disabled = true;

            try {
                // Convert photo to base64 and send via Telegram WebApp
                const reader = new FileReader();
                reader.onload = function() {
                    const base64 = reader.result.split(',')[1]; // remove data:image prefix
                    if (tg) {
                        // Send photo data to bot via sendData
                        tg.sendData(JSON.stringify({
                            type: 'photo',
                            photo: base64,
                            user_id: userId,
                            user_name: userName,
                        }));
                        // WebApp closes after sendData — bot will process and reply in chat
                    }
                };
                reader.readAsDataURL(file);
            } catch(e) {
                document.getElementById('error').textContent = 'Ошибка: ' + e.message;
                document.getElementById('error').style.display = 'block';
                document.getElementById('processing').style.display = 'none';
                document.getElementById('addBtn').disabled = false;
            }
        }

        document.getElementById('addBtn').addEventListener('click', () => {
            document.getElementById('photoInput').click();
        });

        document.getElementById('photoInput').addEventListener('change', (e) => {
            if (e.target.files[0]) uploadPhoto(e.target.files[0]);
            e.target.value = '';
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (tg) tg.showAlert('Сброс сессии — отправь /reset в чат бота');
        });

        // Load data
        loadStats();
        loadLeaderboard();
    </script>
</body>
</html>
